name: Node Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  jest:
    name: Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci
